- id: 'brainspan'
  section: other
  image: 'images/plot-brainspan.png'
  alt: 'Covariance-based sample selection figure'
  title: 'Covariance-based sample selection for heterogeneous data'
  abstract: >
    Microarray samples from brain tissue is hard to collect, and also varies substantially
    depending on the tissue's brain region and the developmental age of its subject, hence it
    is hard to collect enough samples for the statistical analysis. In this paper, we develop
    a sample selection method to find additional microarray samples that are statistically
    similar to the samples of our desired spatio-temporal brain tissue. We demonstrate that
    after apply an existing analysis pipeline to our selected samples, we detect a higher
    percentage of autism risk genes.
  authors:
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'H. Liu', link: han_liu}
    - {name: 'K. Roeder', link: kathryn_roeder}
  pubtitle: 'Covariance-based sample selection for heterogeneous data: Applications to gene expression and autism risk gene detection'
  venue: '<i> <a href="https://amstat.tandfonline.com/toc/uasa20/current" target="_blank">Journal of the American Statistical Association</a> (JASA)</i> 116.533 (2021): 54-67'
  links:
