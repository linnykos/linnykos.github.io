- id: autism-science
  section: highlighted
  image: 'images/plot-science.png'
  alt: 'Autism noncoding genome study figure'
  title: 'Autism risk factors within the noncoding genome'
  abstract: >
    While de novo mutations within the protein-coding portion of the genome have been
    thoroughly studied, these mutations in the noncoding portions which comprise of 98.5% of
    the genome have been less well understood. In this paper, we use a bioinformatics
    framework that builds upon (among other things) sparse PCA and DAWN based on simulated
    null datasets to analyze 1902 autism quartets via WGS and find that the strongest signals
    arose from promoters -- noncoding regions that control gene transcription.
