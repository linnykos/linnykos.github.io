- id: 'destin2'
  section: other
  image: 'images/plot-destin2.png'
  alt: 'Destin2 method figure'
  title: 'Destin2: Unifying peaks, motifs and activity in single-cell ATAC-seq'
  abstract: >
    There are different signals a researcher can extract from single-cell ATAC-seq, and each
    has their own biological relevance for downstream analysis. However, one might want to
    perform computational tasks that aggregate all such signals together. We propose a
    computational framework to aggregate across such signals for downstream visualization,
    cell-clustering and trajectory inference.
  authors:
