- id: 'fused lasso'
  section: other
  image: 'images/plot-fused.png'
  alt: 'Fused lasso method figure'
  title: 'Fused lasso and changepoint screening'
  abstract: >
    Changepoint estimators have statistical theory for how well they estimate the mean
    function and how well they estimate the changepoints, but existing theory often analyzes
    these properties separately. In this paper, we prove a near-optimal estimation rate for
    the fused lasso, which in turn directly proves a changepoint detection rate that is near
    the detection limit. We extend this logic to other estimators and settings.
  authors:
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'J. Sharpnack', link: james_sharpnack}
    - {name: 'A. Rinaldo', link: alessandro_rinaldo}
    - {name: 'R. J. Tibshirani', link: ryan_tibshirani}
  pubtitle: 'A sharp error analysis for the fused Lasso, with application to approximate changepoint screening'
  venue: '<i><a href="https://nips.cc/" target="_blank">Advances in Neural Information Processing Systems</a> (NeurIPS)</i> (2017):'
  links:
