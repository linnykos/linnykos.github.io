- id: 'cpreg'
  section: other
  image: 'images/plot-cpreg.png'
  alt: 'VPWBS changepoint regression figure'
  title: 'VPWBS: Changepoint detection in high-dimensional regression'
  abstract: >
    Methods to detect multiple changepoints in regression coefficients typically have
    localization rate (i.e., rate to estimate the location of the changepoints) that scale
    inversely with the square root with number of samples. In this paper, we develop a method
    that appropriately transforms the regression problem into a one-dimensional problem upon
    which we apply WBS. We prove the convergence rate scales inversely with number of samples,
    a substantial improvement over existing rates.
  authors:
    - {name: 'D. Wang', link: daren_wang}
    - {name: 'Z. Zhao', link: zifeng_zhao}
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'R. Willet', link: rebecca_willet}
  pubtitle: 'Statistically and computationally efficient change point localization in regression settings'
  venue: '<a href="https://www.jmlr.org/" target="_blank">Journal of Machine Learning Research</a> (JMLR) 22.248 (2021): 1-46'
  links:
    - {label: 'link', url: 'https://jmlr.org/papers/v22/19-531.html'}
    - {label: 'arxiv', url: 'https://arxiv.org/abs/1906.11364'}

- id: 'binseg'
  section: other
  image: 'images/plot-binseg.png'
  alt: 'Changepoint post-selection inference figure'
  title: 'Post-selection inference for changepoint problems'
  abstract: >
    Changepoint detection methods such as binary segmentation are often used in CGH analyses
    for copy number variation detection, but these methods lack proper downstream statistical
    inference. In this paper, we develop post-selection hypothesis tests for various
    changepoint detection methods, prove our sampling strategies' validity, and provide
    substantial practical guidelines based on simulation.
  authors:
    - {name: 'S. Hyun', link: sangwon_hyun}
    - {name: 'K. Z. Lin', emph: true}
    - {name: "M. G'Sell", link: max_gsell}
    - {name: 'R. J. Tibshirani', link: ryan_tibshirani}
  pubtitle: 'Valid post-selection inference for segmentation methods with application to copy number variation data'
  venue: '<i> <a href="https://onlinelibrary.wiley.com/journal/15410420" target="_blank">Biometrics</a></i> 77.3 (2021): 1037-1049'
  links:
    - {label: 'link', url: 'https://onlinelibrary.wiley.com/doi/10.1111/biom.13422'}
