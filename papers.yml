- id: 'maxfuse'
  section: highlighted
  image: 'images/plot-maxfuse.png'
  alt: 'MaxFuse method figure'
  title: 'MaxFuse: Diagonal integration of single-cell sequencing data'
  abstract: >
    Different sequencing technologies offer complementary insights into a biological system,
    but it becomes difficult to integrate two datasets together when both datasets differ in
    the specific cells sequenced as well as which features are measured. Hence, using an
    iterative co-embedding based on CCA, data smoothing, and cell matching, we match cells in
    one dataset (i.e., one modality) to the other. The effectiveness of our method is
    demonstrated by integrating scRNA-seq and surface-antibody data, as well as scRNA-seq data
    with spatial proteomic data (such as CODEX) and scATAC-seq.
  authors:
    - {name: 'S. Chen', link: shuxiao_chen}
