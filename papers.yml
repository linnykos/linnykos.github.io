- id: 'singlecell'
  section: highlighted
  image: 'images/plot-singlecell.png'
  alt: 'eSVD method figure'
  title: 'eSVD: Exponential-family embedding for cell developmental trajectories'
  abstract: >
    Common pipelines to estimate the cell developmental trajectories based on single-cell data
    typically first embed each cell into a lower-dimensional space, but these embedding
    typically assume statistical models that do not model single-cell data well. In this
    paper, we develop an embedding for hierarchical model where the inner product between two
    latent low-dimensional vectors is the natural parameter of an exponential family
    distributed random variable, and prove identifiability and convergence. When studying
    oligodendrocytes in fetal mouse brains, we find that oligodendrocytes mature into various
    cell types.
  authors:
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'J. Lei', link: jing_lei}
    - {name: 'K. Roeder', link: kathryn_roeder}
  pubtitle: 'Exponential-family embedding with application to cell developmental trajectories for single-cell RNA-seq data'
  venue: '<i> <a href="https://amstat.tandfonline.com/toc/uasa20/current" target="_blank">Journal of the American Statistical Association</a> (JASA)</i> 116.534 (2021): 457-470'
  links:
    - {label: 'link', url: 'https://www.tandfonline.com/doi/abs/10.1080/01621459.2021.1886106'}
    - {label: 'biorxiv', url: 'https://biorxiv.org/cgi/content/short/2020.09.25.313882'}
