- id: 'ODE'
  section: preprints
  image: 'images/plot-ode.png'
  alt: 'ODEinherit method figure'
  title: 'ODEinherit: Mother-daughter inheritance in cell-cycling'
  abstract: >
    Cells can undergo asymmetric cell division, and in certain systems, the fate of the
    daughter cell can be predicted even before it buds from the mother cell. However, it is
    not well understood what exactly is inherited by the daughter cell. We study budding yeast
    cells via live-cell microscopy to study the protein-protein regulatory network of mother
    cells and their daughter cells as time series, and develop a framework based on ODE
    regulatory networks to estimate the percentage a daughter cell inherits its
    protein-protein regulatory network from its mother at single-cell resolution.
  authors:
    - {name: 'W. Wu', emph: true}
    - {name: 'T. Kennedy'}
    - {name: 'O. Arguello-Miranda', link: orlando_miranda}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'Measuring regulatory network inheritance in dividing yeast cells using ordinary differential equations'
  venue: '2024:'
  links:
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2024.11.23.624995'}
    - {label: 'code: method', url: 'https://github.com/WenbinWu2001/ODEinherit'}
