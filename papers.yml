- id: 'sosd'
  section: highlighted
  image: 'images/plot-sosd.png'
  alt: 'NetworkSoSD method figure'
  title: 'NetworkSoSD: Bias-adjusted spectral embedding for multi-layer networks'
  abstract: >
    While clustering of nodes is now theoretically well-understood for a single network
    through the lense of spectral embeddings, the theoretical understanding for clustering in
    multi-layer networks is less well-understood. In this paper, when the clustering structure
    is shared across all the layers, we develop a simple way to aggregate information across
    layers via squaring the adjacency matrix with an appropriate bias-adjustment. Our
    theoretical analysis shows we can both allow for networks with dissociative structure
    (i.e., negative eigenvalues) and provably obtains consistent clustering even if each
    individual network is extremely sparse. We apply our method to study cluster of genes in
    developing monkey brains.
  authors:
    - {name: 'J. Lei', link: jing_lei}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'Bias-adjusted spectral clustering in multi-layer stochastic block models'
  venue: '<i> <a href="https://amstat.tandfonline.com/toc/uasa20/current" target="_blank">Journal of the American Statistical Association</a> (JASA)</i> 118 (2023):'
  links:
    - {label: 'link', url: 'https://amstat.tandfonline.com/doi/full/10.1080/01621459.2022.2054817'}
    - {label: 'arxiv', url: 'https://arxiv.org/abs/2003.08222'}
    - {label: 'git', url: 'https://github.com/linnykos/networkSoSD'}
