- id: 'SCOPE'
  section: preprints
  image: 'images/plot-scope.png'
  alt: 'SCOPE method figure'
  title: 'SCOPE: Localizing fate-decision states and their regulatory drivers in single-cell differentiation'
  abstract: >
    Defining the discrete boundaries of lineage commitment and the timing of regulatory
    priming remains a significant challenge in developmental biology. We present SCOPE
    (Semi-supervised Conformal Prediction), a framework that leverages conformal inference to
    transform high-dimensional single-cell measurements into rigorous, discrete prediction
    sets of all plausible future fates. By formalizing fate uncertainty with distribution-free
    coverage guarantees, SCOPE localizes transcriptomic branchpoints and identifies windows of
    epigenetic priming where chromatin accessibility foreshadows gene expression. We
    demonstrate its utility across mouse hematopoiesis and human retinogenesis, identifying
    key transcription factor drivers that define the onset of lineage specification.
  authors:
    - {name: 'Y. Zhao', link: yimin_zhao, emph: true}
    - {name: 'C. Finkbeiner', link: connor_finkbeiner}
    - {name: 'M. Setty', link: manu_setty}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'SCOPE: Localizing fate-decision states and their regulatory drivers in single-cell differentiation'
  venue: '2026:'
  links:
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.64898/2026.04.07.717037'}
    - {label: 'code: method and analysis', url: 'https://github.com/YiminZhao97/SCOPE'}

- id: 'Clonotrace'
  section: preprints
  image: 'images/plot-clonotrace.png'
  alt: 'Clonotrace method figure'
  title: 'Clonotrace: Fate bias and pseudotime from joint modeling of single-cell lineage barcode and transcriptomics'
  abstract: >
    Single-cell technologies now measure both gene expression and clonal ancestry, but most
    analysis tools still treat these modalities separately. We develop a framework that
    clusters clones by their "clonotype profiles" (the distributions of their cells across
    transcriptomic space) to jointly model lineage and expression and recover cell-state
    transitions and fate biases. Applied to simulated and experimental systems including
    hematopoiesis, cancer drug resistance models, and CD8 T cells from glioblastoma and
    immunotherapy cohorts, our method reconstructs temporal order across abrupt
    transcriptional shifts, distinguishes unipotent from multipotent progenitors, and uncovers
    subtle, recurrent fate-divergent T cell programs.
  authors:
    - {name: 'Y. Fu', link: yuntian_fu}
    - {name: 'D. Mathew', link: divij_mathew}
    - {name: 'M. Wang'}
    - {name: 'X. E. Chen', link: emilia_chen}
