- id: sensGAN
  section: highlighted
  image: 'images/plot-sensgan.png'
  alt: 'sensGAN method figure'
  title: 'High-dimensional sensitivity Analysis for learning worst-case latent confounders'
  abstract: >
    High-dimensional genomics studies are frequently confounded by unmeasured biological
    processes that obscure disease-specific signals. We introduce sensGAN, a deep-learning
    adversarial framework that systematically explores the confounding spectrum at the pseudo-bulk level by learning
    "worst-case" latent variables that nullify gene associations under novel predictive-gain
    constraints. By treating confounding as a spectrum rather than a fixed correction, we can
    distinguish between transcripts robust to latent biological processes and those likely to
    be artifacts of omitted variable bias. We demonstrate that sensGAN outperforms existing
    surrogate-variable methods in simulations and successfully prioritizes robust disease
    pathways in human Alzheimer's disease microglia.
  authors:
    - {name: 'Y. Lin', link: yifan_lin, emph: true}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'High-Dimensional Sensitivity Analysis for Genomic Studies: An Adversarial Framework for Learning Worst-Case Latent Confounders'
  venue: '<a href="https://icml.cc/" target="_blank">International Conference of Machine Learning</a> To be published 2026:'
  links:
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.64898/2026.05.27.728283'}
    - {label: 'code: method and analysis', url: 'https://github.com/yifanlinz/AD_sensitivity_ICML'}

- id: 'LCL'
  section: highlighted
  image: 'images/plot-lcl.png'
  alt: 'Lineage-aware contrastive learning figure'
  title: 'LCL: Lineage-aware contrastive learning'
  abstract: >
    In static lineage-barcoding single-cell sequencing, we measure both each cell's gene
    expression and its ancestry in order to gain insights into a cell's fate. However, there
    lack methods to identify which genes separate the cells by their lineages. In this work,
    we develop a deep-learning architecture based on contrastive learning to isolate the
    information in the gene expression that recapitulates cells' lineages. We use the lineage
    barcode as the premise of our data augmentation mechanism. This strategy enables us to
    better identify the genes driving fate commitment and cells' fate boundaries.
  authors:
    - {name: 'S. J. Yang', link: joshua_yang, emph: true}
    - {name: 'Y. Wang', link: yixin_wang}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'Leveraging lineage barcodes as natural augmentations for contrastive learning of cell fate in scRNA-seq data'
  venue: '<a href="https://icml.cc/" target="_blank">International Conference of Machine Learning</a> To be published 2026:'
  links:
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2024.10.28.620670'}
    - {label: 'code: method and analysis', url: 'https://github.com/SZ-yang/Lineage-aware_CL'}

- id: 'Replicate'
  section: highlighted
  image: 'images/plot-replicate.png'
  alt: 'Replicate coherence method figure'
  title: 'Replicate coherence: Replicate coherence in RNA velocity via count splitting'
  abstract: >
    RNA velocity has been a transformative tool to study development biology via single-cell
    RNA sequencing. However, although many RNA velocity methods exist, it is common for many
    methods to conflict in the biological interpretation of the results. We develop a method
    called replicate coherence to quantify the uncertainty in the RNA velocity vectors where
    we use the count-splitting framework to emulate having two technical replicates of the
    same exact cells. This allows us to quantify how much uncertainty each RNA velocity result
    has, which enables a more accurate side-by-side comparison of different methods for the
    scRNA-seq dataset at hand.
  authors:
    - {name: 'Y. Li', emph: true}
    - {name: 'Z. J. Wei'}
    - {name: 'Y.-C. Chen', link: yenchi_chen}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'Quantifying stability via count splitting to guide model selection in RNA velocity analyses'
  venue: '<a href="https://academic.oup.com/bioinformaticsadvances" target="_blank">Bioinformatics Advances</a> 6.1 (2026):'
  links:
    - {label: 'link', url: 'https://academic.oup.com/bioinformaticsadvances/article/6/1/vbag104/8653975'}
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2024.11.23.625009'}
    - {label: 'code: method and analysis', url: 'https://github.com/linnykos/veloUncertainty'}

- id: 'GeoAdvAE'
  section: highlighted
  image: 'images/plot-geoadvae.png'
  alt: 'GeoAdvAE method figure'
  title: "GeoAdvAE: Diagonal integration of neural cell's morphology and transcriptomics"
  abstract: >
    A cell's morphology is a powerful readout of a cell's function and state. While microscopy
    allows us to study neural cells' morphology, and single-nuclei RNA-sequencing allows us to
    study a cell's transcriptomics, these two rich data sources are often performed on
    separate cells due to technological limitations. This obstructs us from understanding how
    a neural cell's transcriptomics modulates or responds to changes in its morphology. We
    develop a deep-learning diagonal integration method, to overcome this technological
    limitation. We validate our method on Patch-seq neurons and study genes that control
    microglial morphology from the 5xFAD mouse model for Alzheimer's disease.
  authors:
    - {name: 'J. T. Du', link: turbo_du, emph: true}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'Integrating morphology and gene expression of neural cells in unpaired single-cell data using GeoAdvAE'
  venue: '<a href="https://recomb.org/proceedings/proceedings/2030-2026/2026/" target="_blank">RECOMB Proceedings 2026</a>:'
  links:
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2025.11.19.689368'}
    - {label: 'code: method and analysis', url: 'https://github.com/turbodu222/GeoAdVAE'}

- id: 'dynamic SBM'
  section: highlighted
  image: 'images/plot-dynamicsbm.png'
  alt: 'KD-SoS dynamic stochastic block model figure'
  title: 'KD-SoS: Dynamic stochastic block models'
  abstract: >
    In genomics, we often observe a sequence of graphs over some notion of time, such as the
    gene network ordered by the cells' developmental age. However, there is a lack of concrete
    statistical theory for this setting whose assumptions are amendable for single-cell
    analyses. In this work, we develop an estimator designed for models where the underlying
    stochastic block model is smoothly changing with time, and prove the convergence rates of
    the clustering and estimates of the connectivity matrix under assumptions more general
    than those existing in the literature. We apply this to study the dynamics of gene
    co-expression networks among oligodendrocytes.
  authors:
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'J. Lei', link: jing_lei}
  pubtitle: 'Dynamic clustering for heterophilic stochastic block models with time-varying node memberships'
  venue: '<a href="https://academic.oup.com/biomet" target="_blank">Biometrika</a>: 113.2 (2026):'
  links:
    - {label: 'link', url: 'https://academic.oup.com/biomet/advance-article/doi/10.1093/biomet/asag018/8533255'}
    - {label: 'arxiv', url: 'https://arxiv.org/abs/2403.05654'}
    - {label: 'code: method and analysis', url: 'https://github.com/linnykos/dynamicGraphRoot'}

- id: multiresistance
  section: highlighted
  image: 'images/plot-multiresistance.png'
  alt: 'Multi-treatment resistance study figure'
  title: 'Pre-existing cell states predict resistance to multiple treatments'
  abstract: >
    While resistance to single cancer treatments is well-documented, clinical failure often
    involves multiple therapeutic modalities. We developed a multi-treatment, high-throughput
    clonal tracking framework paired with single-cell RNA sequencing to monitor melanoma
    clones across parallel treatment conditions. We discovered rare "generalist" clones that
    survive multiple diverse treatments and identified pre-treatment CD44 expression as a
    marker for multi-treatment resistance. Our results demonstrate that initial
    differentiation states drive divergent transcriptional paths toward resistance, providing
    a framework for mapping how pre-existing cellular heterogeneity dictates complex
    therapeutic outcomes.
  authors:
    - {name: 'D. L. Schaff', link: dylan_schaff}
    - {name: 'P. E. White'}
    - {name: 'C. J. Cote'}
    - {name: 'G. E. Watterson'}
