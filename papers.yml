- id: 'Glia'
  section: highlighted
  image: 'images/plot-glia.png'
  alt: 'Single-cell glia review figure'
  title: 'Single-cell analysis review in glial cells'
  abstract: >
    Computational single-cell analyses have become quite complex. While there are many tools
    for any particular specific analysis, researchers new to single-cell analyses might often
    feel overwhelmed and not immediately understand the logical flow that connects one
    computational method to another. This review paper highlights the underlying logic of how
    to craft a computational workflow, tailored for the biological context of studying glial
    cells. It starts with thinking about the experimental design, and spotlights common
    pitfalls when planning your own computational workflow.
  authors:
    - {name: 'K. E. Prater', link: katherine_prater}
    - {name: 'K. Z. Lin', emph: true}
  pubtitle: 'All the single cells: Single-cell transcriptomics/epigenomics experimental design and analysis considerations for glial biologists'
  venue: '<a href="https://onlinelibrary.wiley.com/journal/10981136" target="_blank">Glia</a> 73 (2025):'
  links:
    - {label: 'link', url: 'https://onlinelibrary.wiley.com/doi/10.1002/glia.24633'}
    - {label: 'arxiv', url: 'https://arxiv.org/abs/2408.06521'}

- id: 'eSVD-de'
  section: highlighted
  image: 'images/plot-esvd-de.png'
  alt: 'eSVD-DE method figure'
  title: 'eSVD-DE: Differential expression in multi-individual scRNA data'
  abstract: >
    As single-cell RNA-seq (scRNA) transitions from studying cell-lines, clonal mice or a few
    individuals into studying cohorts of individuals, there is a need to create new
    differential expression (DE) methods to investigate DE among individuals instead of among
    cells. Towards this end, we tailor the eSVD, formerly a dimension-reduction tool, equipped
    with a downstream pipeline to perform DE in multi-individual scRNA data, where we both
    design our test statistics to account for variability among and within individuals as well
    as incorporating the individual-level covariates into the eSVD-DE framework. We show that
    this can recover reproducible signals across different datasets as well as achieves higher
    power thanks to its dimension-reduction framework.
  authors:
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'Y. Qiu', link: yixuan_qiu}
    - {name: 'K. Roeder', link: kathryn_roeder}
  pubtitle: 'eSVD-DE: Cohort-wide differential expression in single-cell RNA-seq data using exponential-family embeddings'
  venue: '<a href="https://bmcbioinformatics.biomedcentral.com/" target="_blank">BMC Bioinformatics</a> 25.1 (2024):'
  links:
    - {label: 'link', url: 'https://bmcbioinformatics.biomedcentral.com/articles/10.1186/s12859-024-05724-7'}
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2023.11.22.568369'}
    - {label: 'code: method', url: 'https://github.com/linnykos/eSVD2'}
