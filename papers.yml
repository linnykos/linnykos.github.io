- id: 'cs'
  section: other
  image: 'images/plot-cs.png'
  alt: 'Compressed sensing method figure'
  title: 'Compressed sensing'
  abstract: >
    Many compressed sensing are developed to be as generic as possible, but have shortcomings
    in specialized settings where modern optimization theory can deliver a substantial boost
    in computational efficiency. In this paper, we develop two compressed sensing algorithms,
    one specialized for extremely sparse signals and another specialized for
    Kronecker-structed sensing matrices. We numerically demonstrate a near 10-times reduction
    in computation time compared to other state-of-the-art methods.
  authors:
    - {name: 'R. Vanderbei', link: robert_vanderbei}
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'L. Wang', link: lie_wang}
    - {name: 'H. Liu', link: han_liu}
  pubtitle: 'Revisiting compressed sensing: Exploiting the efficiency of simplex and sparsification methods'
  venue: '<i><a href="https://www.springer.com/mathematics/journal/12532" target="_blank">Mathematical Programming Computation</a></i> 8.3 (2016): 253-269.'
