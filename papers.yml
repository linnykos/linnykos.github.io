    - {name: 'S. Shaffer', link: sydney_shaffer}
    - {name: 'D. M. Pardoll', link: drew_pardoll}
    - {name: 'C. Jackson', link: christina_jackson}
    - {name: 'N. R. Zhang', link: nancy_zhang}
  pubtitle: 'Deciphering Cell Fate and Clonal Dynamics via Integrative Single-Cell Lineage Modeling'
  venue: '2025:'
  links:
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2025.09.01.673503'}
    - {label: 'code: method', url: 'https://github.com/yuntianf/Clonotrace'}

- id: 'ePRS'
  section: preprints
  image: 'images/plot-eprs.png'
  alt: 'Endolysosomal ePRS study figure'
  title: 'Endolysosomal dysfunction across neural cells in AD'
  abstract: >
    It is unclear whether how genetic variants linked to Alzheimer’s disease (AD) like the
    endolysosomal network (ELN) cause functional disruptions in the brain. We developed a
    pathway-specific polygenic risk score (ePRS) based on 13 ELN-related AD GWAS loci and
    analyzed single-nucleus transcriptomes and endolysosomal morphology in post-mortem DLPFC
    samples from AD patients stratified by ePRS burden. Using confocal imaging and snRNA-seq,
    we identified cell-type-specific morphological and transcriptional signatures associated
    with higher ELN genetic risk, including altered endosome and lysosome structures,
    dysregulation of glutamatergic signaling, and increased markers of cellular stress. These
    findings demonstrate that genetic risk in ELN genes contributes to distinct and shared
    cellular phenotypes across neural cell types, suggesting that pathway-specific risk
    variants may drive mechanistic heterogeneity in AD.
  authors:
