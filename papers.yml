- id: 'tilted-cca'
  section: highlighted
  image: 'images/plot-tcca.png'
  alt: 'Tilted-CCA method figure'
  title: 'Tilted-CCA: Disentangling common/distinct information from paired multiomic single-cell data'
  abstract: >
    Paired multiomic single-cell data provides ample opportunities for biologists to study the
    relations between molecular modalities (such as gene expression and chromatin peaks), but
    it difficult to assess what kind of signals are shared in common between the two
    modalities. We developed the Tilted-CCA, which shows the "intersection of information"
    between the two modalities, in contrast with many existing dimension-reduction methods
    that show the "union of information." In particular, the matrix decomposition provided by
    Tilted-CCA allows us to design targeted antibody panels for RNA and surface-antibody
    technologies, as well as uncover the terminal cell-states as well as the relation between
    chromatin open/closed cell-states and gene expression in developmental systems.
  authors:
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'N. R. Zhang', link: nancy_zhang}
  pubtitle: 'Quantifying common and distinct information in single-cell multimodal data with Tilted-CCA'
  venue: '<a href="https://www.pnas.org/" target="_blank">Proceedings of the National Academy of Sciences</a> (PNAS) 120.32 (2023):'
  links:
    - {label: 'link', url: 'https://www.pnas.org/doi/10.1073/pnas.2303647120'}
    - {label: 'biorxiv', url: 'https://www.biorxiv.org/content/10.1101/2022.10.07.511320'}
