- id: wikipedia-bias
  section: other
  image: 'images/plot-wiki.png'
  alt: 'Wikipedia social bias study figure'
  title: 'Social biases in Wikipedia biographies'
  abstract: >
    Social biases can influence Wikipedia articles of individuals across different genders and
    ethnicities that result in disproportionate article lengths, number of languages written
    about said individuals, etc., but these differences can be difficult to quantify
    appropriately. In this paper, we develop a matching method to find an appropriate
    comparison set of articles for each target group of interest (ex: articles of African
    American individuals) based on the articles' categories. We show the differing covariate
    distributions across the different target groups, and uncover quantitative results that
    reinforce existing social theories. This paper won the <a
    href="https://research.wikimedia.org/awards.html" target="_blank">Wikimedia Foundation
    Research Award of the Year</a> in 2023.
  authors:
    - {name: 'A. Field', link: anjalie_field}
    - {name: 'C. Y. Park', link: chan_park}
    - {name: 'K. Z. Lin', emph: true}
    - {name: 'Y. Tsvetkov', link: yulia_tsvetkov}
  pubtitle: 'Controlled Analyses of Social Biases in Wikipedia Bios'
  venue: '<i><a href="https://www2022.thewebconf.org/" target="_blank">Proceedings of the ACM Web Conference 2022</a></i> (2022):'
